plugins {
    id 'org.jetbrains.intellij' version '0.7.3'
    id 'org.jetbrains.kotlin.jvm' version '1.4.32'
}

group 'com.guohanlin.yapiquicktype'
version '1.2.0-FIX-IU171'

repositories {
    mavenLocal()
    maven { url 'http://maven.aliyun.com/nexus/content/groups/public/' }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    implementation('com.alibaba:fastjson:1.2.73')
    implementation("com.squareup.retrofit2:retrofit:2.9.0")
    implementation('com.squareup.retrofit2:converter-gson:2.9.0')
    implementation('com.squareup.retrofit2:adapter-rxjava2:2.9.0')
    implementation('com.squareup.retrofit2:converter-scalars:2.9.0')
}

// See https://github.com/JetBrains/gradle-intellij-plugin/
intellij {
    version "2017.2"
    pluginName 'Yapi QuickType'
    updateSinceUntilBuild false
}

compileKotlin {
    kotlinOptions.jvmTarget = "11"
}

runPluginVerifier {
    ideVersions = ["WS-2017.2.5"]
}

//指定IDE运行
//runIde {
//    ideDirectory = '/Applications/IDEA 2020.1.app/Contents'
//}

patchPluginXml {
    changeNotes """
      1、新增插件国际化
      <br/>
      2、校验逻辑完善
      <br/>
      <br/>
      1. New plugin internationalization
      <br/>
      2. Perfect verification logic
      """
}